id: io.github.dyslechtchitect.tfcbm
runtime: org.gnome.Platform
runtime-version: '49'
sdk: org.gnome.Sdk
command: tfcbm

cleanup:
  - /include
  - /lib/pkgconfig
  - /share/man
  - '*.la'
  - '*.a'

finish-args:
  # Display and IPC
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11

  # XDG Portals for desktop integration
  - --talk-name=org.freedesktop.portal.Desktop       # For notifications, autostart, etc.
  - --talk-name=org.freedesktop.secrets              # For secure password/secret storage

  # D-Bus for GNOME extension communication
  - --own-name=org.tfcbm.ClipboardService            # Main app's D-Bus service for extension communication
  - --talk-name=org.gnome.Shell.Extensions.TfcbmClipboardMonitor  # Extension's D-Bus service for GSettings access
  - --talk-name=org.gnome.Shell.Extensions           # For installing/enabling GNOME extensions (Flathub-compliant)
  # Note: GSettings access is via the host extension's D-Bus interface, not direct dconf

  # Filesystem access for app data and config
  - --filesystem=xdg-data:rw                         # For clipboard history database
  - --filesystem=xdg-config:rw                       # For application settings (settings.json)

  # Environment for portals
  - --env=GTK_USE_PORTAL=1

modules:
  # Python dependencies - only websockets needed (PyGObject and GdkPixbuf provided by runtime)
  - name: python3-websockets
    buildsystem: simple
    build-commands:
      - pip3 install --verbose --exists-action=i --no-index --find-links="file://${PWD}" --prefix=${FLATPAK_DEST} "websockets==15.0.1" --no-build-isolation
    sources:
      - type: file
        url: https://files.pythonhosted.org/packages/fa/a8/5b41e0da817d64113292ab1f8247140aac61cbf6cfd085d6a0fa77f4984f/websockets-15.0.1-py3-none-any.whl
        sha256: f7a866fbc1e97b5c617ee4116daaa09b722101d4a3c170c787450ba409f9736f



  - name: tfcbm
    buildsystem: meson
    sources:
      - type: dir
        path: .

