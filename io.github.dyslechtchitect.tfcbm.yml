id: io.github.dyslechtchitect.tfcbm
runtime: org.gnome.Platform
runtime-version: '49'
sdk: org.gnome.Sdk
command: tfcbm

cleanup:
  - /include
  - /lib/pkgconfig
  - /share/man
  - '*.la'
  - '*.a'

finish-args:
  # IPC for internal helpers
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11

  # Essential XDG Portals for desktop integration
  - --talk-name=org.freedesktop.portal.Desktop       # For general desktop portals (notifications, autostart, etc.)
  - --talk-name=org.freedesktop.portal.Settings      # For GSettings manipulation via portal
  - --talk-name=org.freedesktop.secrets              # For secure password/secret storage

  # Application-specific internal D-Bus communication
  - --talk-name=io.github.dyslechtchitect.tfcbm.helper # For internal app helpers
  - --own-name=org.tfcbm.ClipboardService              # For main app's D-Bus service (allowing other components/host extension to talk to it)

  # Dconf for settings (read-write for app's scope, read-only for system dconf)
  - --filesystem=xdg-run/dconf                       # For the app's dconf settings (read/write within sandbox)
  - --filesystem=~/.config/dconf:ro                  # For reading system dconf profiles/defaults (read-only)

  # Filesystem access for app data/config (use xdg-data/config not raw home)
  - --filesystem=xdg-data:rw                         # For application data (e.g., history database)
  - --filesystem=xdg-config:rw                       # For application configuration

  # Environment variables for UI
  - --env=GTK_USE_PORTAL=1
  - --env=APPINDICATOR=1

modules:
  # Python dependencies - only websockets needed (PyGObject and GdkPixbuf provided by runtime)
  - name: python3-websockets
    buildsystem: simple
    build-commands:
      - pip3 install --verbose --exists-action=i --no-index --find-links="file://${PWD}" --prefix=${FLATPAK_DEST} "websockets==15.0.1" --no-build-isolation
    sources:
      - type: file
        url: https://files.pythonhosted.org/packages/fa/a8/5b41e0da817d64113292ab1f8247140aac61cbf6cfd085d6a0fa77f4984f/websockets-15.0.1-py3-none-any.whl
        sha256: f7a866fbc1e97b5c617ee4116daaa09b722101d4a3c170c787450ba409f9736f



  - name: tfcbm
    buildsystem: meson
    sources:
      - type: dir
        path: .

