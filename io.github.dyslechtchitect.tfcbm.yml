id: io.github.dyslechtchitect.tfcbm
runtime: org.gnome.Platform
runtime-version: '49'
sdk: org.gnome.Sdk
command: tfcbm

cleanup:
  - /include
  - /lib/pkgconfig
  - /share/man
  - '*.la'
  - '*.a'

finish-args:
  # IPC for internal helpers
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11

  # Minimal DBus: only portals your app will use
  - --talk-name=org.freedesktop.portal.Desktop
  - --talk-name=io.github.dyslechtchitect.tfcbm.helper
  - --talk-name=org.freedesktop.Flatpak
  - --system-talk-name=org.freedesktop.PolicyKit1

  # Dconf read-only
  - --filesystem=xdg-run/dconf
  - --filesystem=~/.config/dconf:ro

  # Autostart & extension support
  - --filesystem=~/.local/share/gnome-shell/extensions:create
  - --filesystem=xdg-config/autostart:create

  # Tray icon support
  - --env=GTK_USE_PORTAL=1
  - --env=APPINDICATOR=1

modules:
  - name: python-dependencies
    buildsystem: simple
    build-commands:
      - pip3 install --no-deps --prefix=/app -r flatpak-requirements.txt
    sources:
      - type: file
        path: flatpak-requirements.txt

  - name: tfcbm
    buildsystem: meson
    sources:
      - type: dir
        path: .

  # Optional: portal helper to catch keyboard + clipboard
  - name: tfcbm-helper
    buildsystem: simple
    build-commands:
      - pip3 install --no-deps --prefix=/app helper-dependencies.txt
    sources:
      - type: dir
        path: helper
