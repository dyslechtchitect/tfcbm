id: io.github.dyslechtchitect.tfcbm
runtime: org.gnome.Platform
runtime-version: '49'
sdk: org.gnome.Sdk
command: tfcbm

cleanup:
  - /include
  - /lib/pkgconfig
  - /share/man
  - '*.la'
  - '*.a'

finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --filesystem=home:ro
  - --filesystem=xdg-download:rw
  - --filesystem=xdg-documents:rw
  - --filesystem=~/.local/share/gnome-shell/extensions:create
  - --filesystem=xdg-config/autostart:create
  - --filesystem=xdg-run/dconf
  - --filesystem=~/.config/dconf:ro
  - --talk-name=ca.desrt.dconf
  - --env=DCONF_USER_CONFIG_DIR=.config/dconf
  - --talk-name=io.github.dyslechtchitect.tfcbm
  - --talk-name=org.gnome.Shell
  - --talk-name=org.freedesktop.portal.Desktop
  - --talk-name=org.freedesktop.Flatpak
  - --system-talk-name=org.freedesktop.PolicyKit1

modules:
  - name: python3-pyyaml
    buildsystem: simple
    build-commands:
      - pip3 install --no-deps --prefix=/app PyYAML-6.0.2.tar.gz
    sources:
      - type: pypi
        name: PyYAML
        version: "6.0.2"

  - name: python3-pillow
    buildsystem: simple
    build-commands:
      - pip3 install --no-deps --prefix=/app Pillow-11.0.0.tar.gz
    sources:
      - type: pypi
        name: Pillow
        version: "11.0.0"

  - name: python3-pydantic
    buildsystem: simple
    build-commands:
      - pip3 install --no-deps --prefix=/app pydantic-1.10.15.tar.gz
    sources:
      - type: pypi
        name: pydantic
        version: "1.10.15"


  - name: tfcbm
    buildsystem: meson
    sources:
      - type: git
        url: https://github.com/dyslechtchitect/tfcbm.git
        tag: v1.0.0
